{% extends 'base.html' %}
{% block title %}Log In – SnapIt{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto">
  <div style="text-align:center;margin-bottom:2rem">
    <h1 style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--p),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">SnapIt</h1>
    <p style="color:var(--text2);margin-top:.5rem">Welcome back 👋</p>
  </div>
  <div class="card">
    <form method="POST">
      {% csrf_token %}
      {% if form.errors %}
      <div style="background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:var(--r-md);padding:.75rem 1rem;margin-bottom:1rem;font-size:.88rem;color:var(--danger)">
        <i class="fa-solid fa-triangle-exclamation"></i> Invalid username or password.
      </div>
      {% endif %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" id="id_username" class="form-control" placeholder="your_username" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:.85rem;margin-top:.5rem">Log In</button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--text3)">
      Don't have an account? <a href="{% url 'users:register' %}" style="font-weight:600">Sign Up</a>
    </p>
  </div>
</div>
{% endblock %}
